run: |
  mkdir -p AI_CONTEXT

  for top in *; do
    # Skip AI_CONTEXT to prevent recursion
    if [ "$top" = "AI_CONTEXT" ]; then
      continue
    fi

    if [ -d "$top" ]; then
      mkdir -p "AI_CONTEXT/$top"

      for sub in "$top"/*; do
        if [ -d "$sub" ]; then
          mkdir -p "AI_CONTEXT/$top/$(basename "$sub")"

          for third in "$sub"/*; do
            if [ -d "$third" ]; then
              out="AI_CONTEXT/$top/$(basename "$sub")/$(basename "$third").txt"

              echo "### FOLDER: $third" > "$out"
              echo "" >> "$out"

              find "$third" -maxdepth 1 -type f | while read file; do
                echo "----- FILE: $file -----" >> "$out"
                cat "$file" >> "$out"
                echo "" >> "$out"
                echo "" >> "$out"
              done
            fi
          done

        fi
      done

    fi
  done
