name: Generate AI_CONTEXT Snapshot

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  generate-context:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build 3-layer AI_CONTEXT
        run: |
          mkdir -p AI_CONTEXT

          for top in *; do
            if [ -d "$top" ]; then
              mkdir -p "AI_CONTEXT/$top"

              for sub in "$top"/*; do
                if [ -d "$sub" ]; then
                  mkdir -p "AI_CONTEXT/$top/$(basename "$sub")"

                  for third in "$sub"/*; do
                    if [ -d "$third" ]; then
                      out="AI_CONTEXT/$top/$(basename "$sub")/$(basename "$third").txt"

                      echo "### FOLDER: $third" > "$out"
                      echo "" >> "$out"

                      find "$third" -maxdepth 1 -type f | while read file; do
                        echo "----- FILE: $file -----" >> "$out"
                        cat "$file" >> "$out"
                        echo "" >> "$out"
                        echo "" >> "$out"
                      done
                    fi
                  done

                fi
              done

            fi
          done

      - name: Upload AI_CONTEXT artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_CONTEXT
          path: AI_CONTEXT
